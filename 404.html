<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません｜トランジットWorks</title>
<meta name="theme-color" content="#2d6a4f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;font-weight:300;color:#111;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 24px}
.wrap{max-width:480px}
.code{font-size:clamp(4rem,12vw,8rem);font-weight:100;color:#2d6a4f;letter-spacing:.08em;line-height:1;margin-bottom:16px}
h1{font-size:1.2rem;font-weight:500;margin-bottom:12px}
p{font-size:.88rem;color:#666;line-height:2;margin-bottom:32px}
a{display:inline-block;padding:12px 36px;border:1px solid #2d6a4f;color:#2d6a4f;font-size:.82rem;font-weight:500;text-decoration:none;border-radius:6px;letter-spacing:.04em;transition:background .3s,color .3s}
a:hover{background:#2d6a4f;color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>ページが見つかりません</h1>
  <p>お探しのページは移動または削除された可能性があります。<br>URLをご確認のうえ、再度お試しください。</p>
  <a href="/">トップページへ戻る</a>
</div>
</body>
</html>

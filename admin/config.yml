backend:
  name: github
  repo: toranjiitoworks2-coder/transit-works
  branch: main
  base_url: https://transit-works.pages.dev
  auth_endpoint: oauth/authorize

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "ja"

collections:

  # お知らせ
  - name: "news"
    label: "お知らせ"
    files:
      - name: "news"
        label: "お知らせ一覧"
        file: "_data/news.json"
        fields:
          - label: "お知らせ一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "日付", name: "date", widget: "string"}
              - {label: "カテゴリ", name: "category", widget: "select", options: ["NEWS", "イベント", "活動報告"]}
              - {label: "タイトル", name: "title", widget: "string", required: false}
              - {label: "内容", name: "text", widget: "text"}
              - {label: "画像", name: "image", widget: "image", required: false}
              - {label: "画像の代替テキスト", name: "alt", widget: "string", required: false}

  # 施設紹介・代表メッセージ
  - name: "about"
    label: "施設紹介・代表メッセージ"
    files:
      - name: "about"
        label: "施設紹介・代表メッセージ"
        file: "_data/about.json"
        fields:
          - {label: "施設紹介 写真", name: "about_photo", widget: "image", required: false}
          - {label: "施設紹介 本文1", name: "text1", widget: "text"}
          - {label: "施設紹介 本文2", name: "text2", widget: "text"}
          - {label: "代表メッセージ 本文1", name: "rep1", widget: "text"}
          - {label: "代表メッセージ 本文2", name: "rep2", widget: "text"}
          - {label: "代表メッセージ 本文3", name: "rep3", widget: "text"}
          - {label: "代表メッセージ 本文4", name: "rep4", widget: "text"}
          - {label: "代表氏名", name: "rep_name", widget: "string"}
          - {label: "代表写真", name: "rep_photo", widget: "image", required: false}
          - {label: "統計1 ラベル（例：開所）", name: "stat1_label", widget: "string"}
          - {label: "統計1 値（例：2025年4月1日）", name: "stat1_value", widget: "string"}
          - {label: "統計2 ラベル（例：利用時間）", name: "stat2_label", widget: "string"}
          - {label: "統計2 値（例：9:30〜15:30）", name: "stat2_value", widget: "string"}
          - {label: "統計3 ラベル（例：利用定員）", name: "stat3_label", widget: "string"}
          - {label: "統計3 値（例：20名）", name: "stat3_value", widget: "string"}
          - {label: "統計4 ラベル（例：作品種類）", name: "stat4_label", widget: "string"}
          - {label: "統計4 値（例：10種類以上）", name: "stat4_value", widget: "string"}
          - {label: "理念キャッチ（改行可）", name: "philosophy_catch", widget: "text"}
          - {label: "理念 本文1", name: "philosophy1", widget: "text"}
          - {label: "理念 本文2", name: "philosophy2", widget: "text"}
          - {label: "理念 本文3", name: "philosophy3", widget: "text"}
          - {label: "理念 本文4", name: "philosophy4", widget: "text"}
          - {label: "代表 役職（例：トランジットWorks 代表）", name: "rep_title", widget: "string"}
          - {label: "代表 会社名（例：合同会社ウェルフェア）", name: "rep_company", widget: "string"}

  # ヒーロー
  - name: "hero"
    label: "トップページ"
    files:
      - name: "hero"
        label: "トップページ"
        file: "_data/hero.json"
        fields:
          - {label: "キャッチコピー", name: "catch", widget: "string"}
          - {label: "サブコピー", name: "sub", widget: "string"}
          - label: "ヒーロー画像（スライドショー）"
            name: "slides"
            widget: "list"
            fields:
              - {label: "画像", name: "image", widget: "image"}
              - {label: "画像の代替テキスト", name: "alt", widget: "string", required: false}

  # 活動内容
  - name: "activities"
    label: "活動内容"
    files:
      - name: "activities"
        label: "活動内容ページ"
        file: "_data/activities.json"
        fields:
          - label: "活動一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "番号", name: "num", widget: "string"}
              - {label: "タイトル", name: "title", widget: "string"}
              - {label: "説明", name: "description", widget: "text"}

  # 作品紹介
  - name: "works"
    label: "作品紹介"
    files:
      - name: "works"
        label: "作品紹介ページ"
        file: "_data/works.json"
        fields:
          - label: "作品一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "作品名", name: "title", widget: "string"}
              - {label: "説明", name: "description", widget: "text"}
              - {label: "画像", name: "image", widget: "image", required: false}
              - {label: "カテゴリ", name: "category", widget: "select", options: ["受託作業", "自主製品"], required: false}
              - {label: "YouTube URL（試聴・任意）", name: "youtube_url", widget: "string", required: false}
              - {label: "画像の代替テキスト", name: "alt", widget: "string", required: false}

  # 作品ギャラリー（Voyage）
  - name: "gallery"
    label: "作品ギャラリー（Voyage）"
    files:
      - name: "gallery"
        label: "作品ギャラリー"
        file: "_data/gallery.json"
        fields:
          - label: "ギャラリー画像一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "画像", name: "image", widget: "image", required: true}
              - {label: "説明文(alt)", name: "alt", widget: "string", required: false}

  # ご利用条件（Target）
  - name: "target"
    label: "ご利用条件（Target）"
    files:
      - name: "target"
        label: "ご利用条件"
        file: "_data/target.json"
        fields:
          - {label: "リード文", name: "lead", widget: "text"}
          - label: "条件一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "番号", name: "num", widget: "string"}
              - {label: "内容", name: "title", widget: "string"}
              - {label: "補足", name: "detail", widget: "string", required: false}
          - {label: "注記", name: "note", widget: "text"}

  # ご利用の流れ（Flow）
  - name: "flow"
    label: "ご利用の流れ（Flow）"
    files:
      - name: "flow"
        label: "ご利用の流れ"
        file: "_data/flow.json"
        fields:
          - {label: "リード文", name: "lead", widget: "text"}
          - label: "ステップ一覧"
            name: "steps"
            widget: "list"
            fields:
              - {label: "番号", name: "num", widget: "string"}
              - {label: "タイトル", name: "title", widget: "string"}
              - {label: "説明", name: "description", widget: "text"}

  # よくある質問
  - name: "faq"
    label: "よくある質問"
    files:
      - name: "faq"
        label: "FAQページ"
        file: "_data/faq.json"
        fields:
          - label: "質問一覧"
            name: "items"
            widget: "list"
            fields:
              - {label: "質問", name: "question", widget: "string"}
              - {label: "回答", name: "answer", widget: "text"}

  # 基本情報
  - name: "settings"
    label: "基本情報"
    files:
      - name: "settings"
        label: "施設基本情報"
        file: "_data/settings.json"
        fields:
          - {label: "施設名", name: "name", widget: "string"}
          - {label: "電話番号", name: "phone", widget: "string"}
          - {label: "住所", name: "address", widget: "string"}
          - {label: "利用時間（平日）", name: "hours_weekday", widget: "string"}
          - {label: "利用時間（土曜）", name: "hours_saturday", widget: "string"}
          - {label: "休業日", name: "closed", widget: "string"}
          - {label: "お問い合わせ リード文", name: "contact_lead", widget: "text"}
          - {label: "お問い合わせ 注記", name: "contact_note", widget: "text"}
          - {label: "施設種別（例：就労継続支援B型）", name: "facility_type", widget: "string"}
          - {label: "CTAボタン文言", name: "cta_text", widget: "string"}
          - {label: "リード文：活動内容", name: "lead_activities", widget: "text"}
          - {label: "リード文：作品紹介", name: "lead_works", widget: "text"}
          - {label: "リード文：作品ギャラリー", name: "lead_gallery", widget: "text"}
          - {label: "リード文：ご利用条件", name: "lead_target", widget: "text"}